    .custom-scrollbar {
  background-color: rgb(20, 20, 20);
  height: 150px;
  width: 150px;
  overflow: scroll;
  overflow-x: hidden;
  border-radius: 10px;
  font-size: 10px;
}

/* width */
.custom-scrollbar::-webkit-scrollbar {
  width: 18px; /* Set the width for the scrollbar */
}

/* Track */
.custom-scrollbar::-webkit-scrollbar-track {
  box-shadow: inset  5px 5px rgb(192, 154, 2); 
  border-radius: 10px;
}
 
/* Handle */
.custom-scrollbar::-webkit-scrollbar-thumb {
    background: url(pixels/bunnystamp1.png);
}

/* Handle on hover */
.custom-scrollbar::-webkit-scrollbar-thumb:hover {
    opacity: 50%;
}
