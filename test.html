<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Page Example</title>
    <style>
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <nav>
        <button data-target="home">Home</button>
        <button data-target="about">About</button>
        <button data-target="contact">Contact</button>
    </nav>

    <div id="home" class="page active">
        <h1>Home Page</h1>
        <p>Welcome to the home page.</p>
    </div>

    <div id="about" class="page">
        <h1>About Page</h1>
        <p>This is the about page.</p>
    </div>

    <div style="background: blue;" id="contact" class="page">
        <h1>Contact Page</h1>
        <p>Get in touch through the contact page.</p>
    </div>

    <script>
        const buttons = document.querySelectorAll('nav button');
        const pages = document.querySelectorAll('.page');

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const target = button.getAttribute('data-target');

                pages.forEach(page => {
                    if (page.id === target) {
                        page.classList.add('active');
                    } else {
                        page.classList.remove('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
